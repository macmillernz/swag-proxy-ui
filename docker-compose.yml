services:
  swag-proxy-ui:
    build: .
    restart: unless-stopped
    ports:
      - "9000:8000"
    volumes:
      # Mount your SWAG config volume — adjust the host path to match your setup
      - /opt/appdata/swag/nginx/proxy-confs:/config/nginx/proxy-confs:rw
    environment:
      - PROXY_CONF_DIR=/config/nginx/proxy-confs
    # Optional: put this on the same Docker network as SWAG so container names resolve
    # networks:
    #   - swag_net

# networks:
#   swag_net:
#     external: true
#     name: swag_net

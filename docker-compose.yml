services:
  swag-proxy-ui:
    build: .
    restart: unless-stopped
    ports:
      - "9000:8000"
    volumes:
      # Single mount — gives access to nginx/, dns-conf/, site-confs/ etc.
      - /opt/appdata/swag:/config:rw
      # Docker socket — needed for the Reload nginx button
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # Name of your SWAG container (default: swag)
      - SWAG_CONTAINER_NAME=swag
    # Optional: join the same network as SWAG so container names resolve
    # networks:
    #   - swag_net

# networks:
#   swag_net:
#     external: true
#     name: swag_net
